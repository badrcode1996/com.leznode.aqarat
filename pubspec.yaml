name: aqarat
description: B2B Multi-Tenant Real Estate Management SaaS.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management (multi-tenant isolation via scoped providers)
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.4
  cloud_functions: ^5.1.3

  # PDF generation + printing (RTL Kurdish/Arabic)
  pdf: ^3.12.0
  printing: ^5.13.3

  # Click-to-call / external links
  url_launcher: ^6.3.1

  # Image picking (company logo upload)
  image_picker: ^1.1.2

  # Charts (dashboard stat sparklines)
  fl_chart: ^0.69.0

  # Utils
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/
  fonts:
    # SPEDA — Kurdish/Arabic RTL-capable font used across the UI and PDF export.
    - family: Speda
      fonts:
        - asset: assets/fonts/SPEDA.ttf
        - asset: assets/fonts/SPEDA-Bold.ttf
          weight: 700
